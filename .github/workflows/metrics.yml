name: Metrics
on:
  # Refresh once a day
  schedule: [{cron: "0 0 * * *"}]
  # Allow manual trigger from the Actions tab
  workflow_dispatch:
  # Refresh whenever you push to this repo
  push: {branches: ["main"]}

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: github-metrics.svg

          # ---------- base ----------
          base: header, activity, community, repositories
          config_timezone: Asia/Kolkata

          # ---------- languages ----------
          plugin_languages: yes
          plugin_languages_analysis_timeout: 15
          plugin_languages_categories: markup, programming
          plugin_languages_recent_categories: markup, programming
          plugin_languages_recent_days: 14
          plugin_languages_threshold: 0%
          plugin_languages_ignored: html, css
          plugin_languages_details: bytes-size, percentage
          plugin_languages_limit: 8

          # ---------- isometric contribution calendar ----------
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

          # ---------- coding habits and activity ----------
          plugin_habits: yes
          plugin_habits_facts: yes
          plugin_habits_charts: yes
          plugin_habits_days: 14

          # ---------- pagespeed insights ----------
          plugin_pagespeed: yes
          plugin_pagespeed_url: https://github.com/Haransinka0
          plugin_pagespeed_detailed: yes

          # ---------- music ----------
          # Note: Requires Spotify/Apple Music secret tokens to be set up if enabled.
          # We'll enable it for Last.fm (simplest, no OAuth needed) or keep it placeholder/commented if you don't have it.
          # To match the screenshot, you can configure spotify/apple music here.
          # plugin_music: yes
          # plugin_music_provider: spotify

          # ---------- notable repos ----------
          plugin_repositories: yes
